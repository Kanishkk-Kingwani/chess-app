<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review game - Chess</title>
  <script src="js/theme.js"></script>
  <link rel="stylesheet"
        href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <button id="themeBtn" class="theme-btn" onclick="cycleTheme()">◐ Auto</button>

  <div class="game-wrap">
    <section class="board-col">
      <div id="board"></div>
      <div class="board-foot">Use ◀ ▶ or click a move to step through the game.</div>
    </section>

    <aside class="panel-col">
      <div class="panel-head">
        <div class="players">
          <span class="player"><span class="dot white"></span><span id="whiteName">White</span></span>
          <span class="player"><span id="blackName">Black</span><span class="dot black"></span></span>
        </div>
        <div id="meta" class="turn">Loading…</div>
      </div>

      <div id="moves" class="scoresheet"><div class="empty">Loading…</div></div>

      <div class="analysis-controls">
        <button id="first" class="btn">⏮</button>
        <button id="prev"  class="btn">◀</button>
        <button id="next"  class="btn">▶</button>
        <button id="last"  class="btn">⏭</button>
      </div>
      <div class="panel-actions">
        <button id="history" class="btn">Past games</button>
        <button id="menu" class="btn btn-ghost">Menu</button>
      </div>
    </aside>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/analysis.js"></script>
</body>
</html>
